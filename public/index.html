<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mathgoal - Futbol maç verileri, bahis oranları ve analiz dashboard" />
    <title>Mathgoal Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #060a13;
        --bg-2: #0c1220;
        --panel: #111827;
        --panel-2: #1a2332;
        --panel-3: #1f2d3d;
        --border: rgba(99, 132, 175, 0.15);
        --border-hl: rgba(99, 179, 237, 0.3);
        --text: #e2e8f0;
        --text-dim: #8896a8;
        --text-muted: #5b6b7d;
        --accent: #38bdf8;
        --accent-2: #818cf8;
        --green: #34d399;
        --green-bg: rgba(52, 211, 153, 0.12);
        --red: #f87171;
        --red-bg: rgba(248, 113, 113, 0.12);
        --yellow: #fbbf24;
        --yellow-bg: rgba(251, 191, 36, 0.1);
        --blue-bg: rgba(56, 189, 248, 0.1);
        --radius: 10px;
        --radius-lg: 14px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      /* ─── Header ─── */
      .header {
        background: linear-gradient(135deg, #0c1220 0%, #111d2e 100%);
        border-bottom: 1px solid var(--border);
        padding: 18px 0;
      }
      .header-inner {
        max-width: 1480px; margin: 0 auto; padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
      }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand-icon {
        width: 36px; height: 36px; border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 16px; color: #fff;
      }
      .brand h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
      .brand span { color: var(--accent); }
      .header-stats { display: flex; gap: 24px; }
      .header-stat { text-align: center; }
      .header-stat .val { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
      .header-stat .lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

      /* ─── Main Layout ─── */
      .container { max-width: 1480px; margin: 0 auto; padding: 20px 24px; }

      /* ─── Filter Bar ─── */
      .filter-bar {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px 20px;
        display: flex; flex-wrap: wrap; gap: 12px; align-items: end;
        margin-bottom: 16px;
      }
      .filter-group { display: flex; flex-direction: column; gap: 4px; }
      .filter-group label {
        font-size: 0.72rem; color: var(--text-dim); font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.8px;
      }
      .filter-group input, .filter-group select {
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 8px 12px;
        font-family: inherit;
        font-size: 0.85rem;
        min-width: 140px;
        outline: none;
        transition: border-color 0.2s;
      }
      .filter-group input:focus, .filter-group select:focus {
        border-color: var(--accent);
      }
      .filter-group select { cursor: pointer; }
      .filter-actions { display: flex; gap: 8px; align-items: end; margin-left: auto; }
      .btn {
        padding: 8px 18px; border-radius: 8px; border: none;
        font-family: inherit; font-size: 0.85rem; font-weight: 600;
        cursor: pointer; transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
      }
      .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
      .btn-ghost {
        background: var(--panel-2); color: var(--text-dim);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover { background: var(--panel-3); color: var(--text); }

      /* ─── Match Table ─── */
      .table-container {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      table { width: 100%; border-collapse: collapse; }
      thead th {
        background: var(--bg-2);
        padding: 12px 14px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        text-align: left;
        position: sticky; top: 0; z-index: 2;
        border-bottom: 1px solid var(--border);
      }
      tbody tr {
        cursor: pointer;
        transition: background 0.15s;
        border-bottom: 1px solid rgba(99, 132, 175, 0.06);
      }
      tbody tr:hover { background: rgba(56, 189, 248, 0.04); }
      tbody tr.selected { background: rgba(56, 189, 248, 0.08); }
      tbody td {
        padding: 10px 14px;
        font-size: 0.88rem;
        white-space: nowrap;
      }
      .team-name { font-weight: 600; }
      .score {
        font-weight: 700; font-size: 0.95rem;
        background: var(--panel-2);
        padding: 3px 10px; border-radius: 6px;
        display: inline-block;
      }
      .pill {
        padding: 3px 10px; border-radius: 20px;
        font-size: 0.78rem; font-weight: 700;
      }
      .ms1 { background: var(--green-bg); color: var(--green); }
      .ms0 { background: var(--blue-bg); color: var(--accent); }
      .ms2 { background: var(--red-bg); color: var(--red); }
      .text-dim { color: var(--text-dim); font-size: 0.82rem; }

      /* ─── Odds Detail Panel ─── */
      .odds-panel {
        display: none;
        background: var(--bg-2);
        border: 1px solid var(--border-hl);
        border-radius: var(--radius-lg);
        margin: 16px 0;
        overflow: hidden;
        animation: slideDown 0.3s ease;
      }
      .odds-panel.active { display: block; }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .odds-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px;
        background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
        border-bottom: 1px solid var(--border);
      }
      .odds-match-info { display: flex; align-items: center; gap: 12px; }
      .odds-match-info .home { font-weight: 700; font-size: 1.1rem; }
      .odds-match-info .vs { color: var(--text-muted); font-size: 0.85rem; }
      .odds-match-info .away { font-weight: 700; font-size: 1.1rem; }
      .odds-match-info .odds-score {
        font-weight: 800; font-size: 1.2rem;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        padding: 0 8px;
      }
      .odds-close-btn {
        background: var(--panel-3); border: 1px solid var(--border);
        color: var(--text-dim); border-radius: 8px; padding: 6px 14px;
        cursor: pointer; font-size: 0.82rem; font-family: inherit;
        transition: all 0.2s;
      }
      .odds-close-btn:hover { background: var(--red-bg); color: var(--red); }

      .odds-body { padding: 16px 20px; }

      /* Odds Category Tabs */
      .odds-categories {
        display: flex; gap: 4px; flex-wrap: wrap;
        margin-bottom: 16px;
        background: var(--panel); border-radius: 10px; padding: 4px;
      }
      .odds-cat-btn {
        padding: 8px 14px; border-radius: 8px; border: none;
        background: transparent; color: var(--text-dim);
        font-family: inherit; font-size: 0.8rem; font-weight: 600;
        cursor: pointer; transition: all 0.2s;
      }
      .odds-cat-btn:hover { color: var(--text); background: var(--panel-2); }
      .odds-cat-btn.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
      }

      /* Odds Grid */
      .odds-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
      .odds-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        transition: border-color 0.2s;
      }
      .odds-card:hover { border-color: var(--border-hl); }
      .odds-card-title {
        font-size: 0.75rem; font-weight: 700; color: var(--accent);
        text-transform: uppercase; letter-spacing: 0.8px;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .odds-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 5px 0;
      }
      .odds-label { color: var(--text-dim); font-size: 0.82rem; }
      .odds-value {
        font-weight: 700; font-size: 0.9rem;
        padding: 2px 8px; border-radius: 5px;
        background: rgba(56, 189, 248, 0.08);
      }
      .odds-value.highlight-green { color: var(--green); background: var(--green-bg); }
      .odds-value.highlight-red { color: var(--red); background: var(--red-bg); }

      /* Opening/Closing comparison */
      .odds-compare {
        display: flex; gap: 8px; align-items: center;
      }
      .odds-tag {
        font-size: 0.65rem; font-weight: 700; padding: 2px 6px;
        border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
      }
      .tag-opening { background: var(--yellow-bg); color: var(--yellow); }
      .tag-closing { background: var(--blue-bg); color: var(--accent); }
      .odds-arrow { color: var(--text-muted); font-size: 0.75rem; }

      /* ─── Footer ─── */
      .footer-bar {
        display: flex; justify-content: space-between; align-items: center;
        padding: 14px 0; color: var(--text-dim); font-size: 0.85rem;
      }
      .pagination { display: flex; gap: 6px; }
      .pagination .btn { min-width: 80px; }
      .pagination .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      #statusText { font-size: 0.82rem; }
      .status-ok { color: var(--green); }
      .status-err { color: var(--red); }
      .status-loading { color: var(--yellow); }

      /* ─── Loading Spinner ─── */
      .spinner {
        display: inline-block; width: 16px; height: 16px;
        border: 2px solid var(--border); border-top-color: var(--accent);
        border-radius: 50%; animation: spin 0.6s linear infinite;
        margin-right: 6px; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ─── Empty State ─── */
      .empty-row td { text-align: center; padding: 40px; color: var(--text-muted); }

      /* ─── Responsive ─── */
      .table-scroll { overflow-x: auto; max-height: 65vh; overflow-y: auto; }
      @media (max-width: 768px) {
        .header-stats { display: none; }
        .filter-bar { flex-direction: column; }
        .filter-actions { margin-left: 0; width: 100%; }
        .odds-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-icon">M</div>
          <h1>Math<span>goal</span></h1>
        </div>
        <div class="header-stats">
          <div class="header-stat">
            <div class="val" id="statMatches">-</div>
            <div class="lbl">Maç</div>
          </div>
          <div class="header-stat">
            <div class="val" id="statLeagues">-</div>
            <div class="lbl">Lig</div>
          </div>
          <div class="header-stat">
            <div class="val" id="statCountries">-</div>
            <div class="lbl">Ülke</div>
          </div>
          <div class="header-stat">
            <div class="val" id="statFirstDate">-</div>
            <div class="lbl">İlk Maç</div>
          </div>
          <div class="header-stat">
            <div class="val" id="statLastDate">-</div>
            <div class="lbl">Son Maç</div>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- Filters -->
      <section class="filter-bar">
        <div class="filter-group">
          <label for="fSearch">Ara</label>
          <input id="fSearch" type="text" placeholder="Takım / Maç ID" />
        </div>
        <div class="filter-group">
          <label for="fCountry">Ülke</label>
          <input id="fCountry" type="text" placeholder="England" />
        </div>
        <div class="filter-group">
          <label for="fLeague">Lig</label>
          <input id="fLeague" type="text" placeholder="Premier League" />
        </div>
        <div class="filter-group">
          <label for="fSeason">Sezon</label>
          <input id="fSeason" type="text" placeholder="2025-2026" />
        </div>
        <div class="filter-group">
          <label for="fDateFrom">Başlangıç</label>
          <input id="fDateFrom" type="date" />
        </div>
        <div class="filter-group">
          <label for="fDateTo">Bitiş</label>
          <input id="fDateTo" type="date" />
        </div>
        <div class="filter-group">
          <label for="fBookmaker">Bahis Bürosu</label>
          <select id="fBookmaker">
            <option value="bet365">bet365</option>
            <option value="BetMGM">BetMGM</option>
            <option value="Betfred">Betfred</option>
            <option value="Unibetuk">Unibet</option>
            <option value="Betway">Betway</option>
            <option value="Midnite">Midnite</option>
            <option value="Ladbrokes">Ladbrokes</option>
            <option value="7Bet">7Bet</option>
            <option value="Betfair">Betfair</option>
            <option value="BetUK">BetUK</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="fOddsType">Oran Tipi</label>
          <select id="fOddsType">
            <option value="all">Tümü</option>
            <option value="opening">Sadece Açılış</option>
            <option value="closing">Sadece Kapanış</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-primary" id="btnApply">Filtrele</button>
          <button class="btn btn-ghost" id="btnClear">Temizle</button>
        </div>
      </section>

      <!-- Odds Detail Panel (shows when a match is clicked) -->
      <section class="odds-panel" id="oddsPanel">
        <div class="odds-header">
          <div class="odds-match-info">
            <span class="home" id="oddsHome">-</span>
            <span class="odds-score" id="oddsScore">-</span>
            <span class="away" id="oddsAway">-</span>
            <span class="text-dim" id="oddsInfo"></span>
          </div>
          <button class="odds-close-btn" id="oddsClose">✕ Kapat</button>
        </div>
        <div class="odds-body">
          <div class="odds-categories" id="oddsCategoryTabs"></div>
          <div class="odds-grid" id="oddsGrid"></div>
        </div>
      </section>

      <!-- Match Table -->
      <section class="table-container">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Tarih</th>
                <th>Saat</th>
                <th>Lig</th>
                <th>Ev Sahibi</th>
                <th>Skor</th>
                <th>Deplasman</th>
                <th>MS</th>
                <th>İY</th>
                <th>1</th>
                <th>X</th>
                <th>2</th>
                <th>O/U 2.5</th>
              </tr>
            </thead>
            <tbody id="matchesBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Footer -->
      <footer class="footer-bar">
        <span id="statusText"></span>
        <span id="pageInfo">-</span>
        <div class="pagination">
          <button class="btn btn-ghost" id="btnPrev" disabled>← Önceki</button>
          <button class="btn btn-ghost" id="btnNext" disabled>Sonraki →</button>
        </div>
      </footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
