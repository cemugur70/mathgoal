<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathgoal Dashboard</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
        --accent-2: #3b82f6;
        --danger: #ef4444;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
        color: var(--text);
      }
      .container {
        width: min(1200px, 94vw);
        margin: 32px auto;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 1.9rem;
      }
      .subtitle {
        color: var(--muted);
        margin-bottom: 24px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      .card {
        background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 14px;
      }
      .card .label {
        color: var(--muted);
        font-size: 0.84rem;
      }
      .card .value {
        margin-top: 8px;
        font-size: 1.4rem;
        font-weight: 700;
      }
      .filters {
        margin-top: 18px;
        background: var(--panel);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.82rem;
        color: var(--muted);
      }
      input,
      button {
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: #0b1220;
        color: var(--text);
      }
      button {
        cursor: pointer;
        font-weight: 600;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        border: none;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: end;
      }
      .actions button.clear {
        background: #334155;
      }
      .table-wrap {
        margin-top: 16px;
        background: var(--panel);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }
      th,
      td {
        padding: 10px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        text-align: left;
        white-space: nowrap;
      }
      th {
        color: #cbd5e1;
        font-size: 0.86rem;
        position: sticky;
        top: 0;
        background: #111827;
      }
      .muted {
        color: var(--muted);
      }
      .pill {
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .ms1 {
        background: rgba(34, 197, 94, 0.2);
        color: #86efac;
      }
      .ms0 {
        background: rgba(59, 130, 246, 0.18);
        color: #93c5fd;
      }
      .ms2 {
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
      }
      .footer {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .pagination {
        display: flex;
        gap: 8px;
      }
      .pagination button {
        width: auto;
        min-width: 84px;
      }
      .status {
        margin-top: 12px;
        color: #fbbf24;
      }
      .error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Mathgoal Dashboard</h1>
      <div class="subtitle">PostgreSQL uzerinden mac verileri ve ozet metrikler</div>

      <section class="cards">
        <article class="card">
          <div class="label">Toplam Mac</div>
          <div class="value" id="totalMatches">-</div>
        </article>
        <article class="card">
          <div class="label">Lig Sayisi</div>
          <div class="value" id="totalLeagues">-</div>
        </article>
        <article class="card">
          <div class="label">Ulke Sayisi</div>
          <div class="value" id="totalCountries">-</div>
        </article>
        <article class="card">
          <div class="label">Ilk Mac Tarihi</div>
          <div class="value" id="firstDate">-</div>
        </article>
        <article class="card">
          <div class="label">Son Mac Tarihi</div>
          <div class="value" id="lastDate">-</div>
        </article>
      </section>

      <section class="filters">
        <div>
          <label for="search">Ara (takim veya id)</label>
          <input id="search" type="text" placeholder="Galatasaray / pYP9mZXF" />
        </div>
        <div>
          <label for="country">Ulke</label>
          <input id="country" type="text" placeholder="Turkey" />
        </div>
        <div>
          <label for="league">Lig</label>
          <input id="league" type="text" placeholder="Super Lig" />
        </div>
        <div>
          <label for="season">Sezon</label>
          <input id="season" type="text" placeholder="2025-2026" />
        </div>
        <div>
          <label for="dateFrom">Tarih Baslangic</label>
          <input id="dateFrom" type="date" />
        </div>
        <div>
          <label for="dateTo">Tarih Bitis</label>
          <input id="dateTo" type="date" />
        </div>
        <div class="actions">
          <button id="applyFilters">Filtrele</button>
          <button class="clear" id="clearFilters">Temizle</button>
        </div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Mac ID</th>
              <th>Tarih</th>
              <th>Saat</th>
              <th>Ulke</th>
              <th>Lig</th>
              <th>Sezon</th>
              <th>Ev Sahibi</th>
              <th>Skor</th>
              <th>Deplasman</th>
              <th>MS</th>
              <th>Guncelleme</th>
            </tr>
          </thead>
          <tbody id="matchesTableBody"></tbody>
        </table>
      </section>

      <div id="status" class="status"></div>
      <footer class="footer">
        <span id="paginationInfo">-</span>
        <div class="pagination">
          <button id="prevPage">Onceki</button>
          <button id="nextPage">Sonraki</button>
        </div>
      </footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
